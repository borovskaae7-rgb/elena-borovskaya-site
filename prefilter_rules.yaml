required_patterns:
  telegram:
    pattern: "(?:t\\.me/|telegram|телеграм|@\\w{4,})"
    weight: 3
  whatsapp:
    pattern: "(?:wa\\.me/|whatsapp|ватсап|вотсап)"
    weight: 2
  course_signup:
    pattern: "(?:запис(?:аться|ь)|регистрац\\w*|оставить\\s+заявк\\w*).{0,80}(?:курс|обучен|вебинар|интенсив|марафон)"
    weight: 8
  free_lesson:
    pattern: "(?:бесплатн\\w*).{0,40}(?:урок|вебинар|разбор|консультац|гайд|чек.?лист)"
    weight: 6
  webinar_link:
    pattern: "https?://[^\\s]+(?:webinar|vebinar|вебинар|room|event|meet)"
    weight: 5
  marathon_link:
    pattern: "https?://[^\\s]+(?:marathon|марафон|intensive|интенсив)"
    weight: 5
  landing_platform:
    pattern: "(?:getcourse|геткурс|antitreningi|prodamus|tilda|taplink|salebot|senler)"
    weight: 4
forbidden_patterns:
  offline_food:
    pattern: "(?:бизнес-ланч|доставка\\s+еды|заказ\\s+столик|меню\\s+кафе)"
    weight: -8
  auto_services:
    pattern: "(?:замена\\s+масла|ремонт\\s+авто|шиномонтаж|развал.?схождение)"
    weight: -10
  retail_order:
    pattern: "(?:купить|заказать|в\\s+наличии).{0,40}(?:диван|шкаф|окна|двери|пиццу|роллы|букет)"
    weight: -12
  rental_realty:
    pattern: "(?:сдам|сдается|посуточно|аренда).{0,40}(?:квартира|дом|офис|склад)"
    weight: -8
regex_patterns:
  lead_magnet:
    pattern: "(?:получить|скачать|забрать).{0,40}(?:гайд|чек.?лист|pdf|инструкц\\w*)"
    weight: 5
  consultation_signup:
    pattern: "(?:запис(?:аться|ь)|заявк\\w*).{0,50}(?:консультац\\w*|разбор|диагностик\\w*)"
    weight: 5
  education_result:
    pattern: "(?:после\\s+курса|на\\s+курсе\\s+вы|вы\\s+научитесь|освоите|получите\\s+навык)"
    weight: 6
  student_case:
    pattern: "(?:кейс\\w*|отзыв\\w*|результат\\w*).{0,60}(?:ученик\\w*|студент\\w*|выпускник\\w*)"
    weight: 4
phone_patterns:
  ru_phone:
    pattern: "(?:(?:\\+?7|8)[\\s\\-\\(\\)]*)?\\d{3}[\\s\\-\\)]*\\d{3}[\\s\\-]*\\d{2}[\\s\\-]*\\d{2}"
    weight: 1
telegram_patterns:
  telegram_link:
    pattern: "(?:https?://)?t\\.me/[A-Za-z0-9_]+"
    weight: 3
  telegram_handle:
    pattern: "@\\w{4,}"
    weight: 2
whatsapp_patterns:
  whatsapp_link:
    pattern: "(?:https?://)?wa\\.me/\\d+"
    weight: 2
email_patterns:
  email:
    pattern: "[A-Za-z0-9._%+\\-]+@[A-Za-z0-9.\\-]+\\.[A-Za-z]{2,}"
    weight: 1
landing_patterns:
  getcourse:
    pattern: "getcourse\\."
    weight: 4
  tilda:
    pattern: "tilda\\."
    weight: 2
  taplink:
    pattern: "taplink\\."
    weight: 2
social_patterns:
  vk_public:
    pattern: "vk\\.com/(?:club|public)\\d+"
    weight: 1
  youtube:
    pattern: "youtube\\.com|youtu\\.be"
    weight: 1
  instagram:
    pattern: "instagram\\.com"
    weight: 1
